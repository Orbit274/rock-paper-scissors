<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo">
        <img src="images/cowboyHat.png">
    </div>

    <div class="title">
        Western Standoff
    </div>

    <div class="arena">
        <div class="cowboys">
            <div class="player">
                <img class="hidden" src="images/bulletHole.png">
                <img src="images/cowboy.png">
                <div class="playerChoices">
                    <button class="rock">
                        Rock
                    </button>
                    <button class="paper">
                        Paper
                    </button>
                    <button class="scissors">
                        Scissors
                    </button>
                </div>
            </div>

            <div class="ai">
                <img class="hidden" src="images/bulletHole.png">
                <img src="images/cowboy2.png">
                <div class="aiChoices">
                    <button class="rock disabled">
                        
                    </button>
                    <button class="paper disabled">
                        
                    </button>
                    <button class="scissors disabled">
                        
                    </button>
                </div>
            </div>
        </div>

        <div class="gameText">
            <div class="pop hidden">
                DRAW!
            </div>
        </div>
        <button class="readyButton"> Ready! </button>
    </div>

    <div class="ground">
        <div class="tumbleweed">
            <img src = "images/tumbleweed.png">
        </div>
    </div>

    <div class="healthBars">
        <div class="playerHealth">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
        </div>

        <div class="aiHealth">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
            <img class="heart" src="images/heart.png">
        </div>

        <div class="roundText">Round: 0</div>
    </div>
     
    <script src="script.js"></script>
</body>
</html>
