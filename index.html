<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img src="images/cowboyHat.png">

    <div class="title">
        Western Standoff
    </div>

    <div class="arena">
        <div class="cowboys">
            <div class="player">
                <img src="images/bulletHole.png">
                <img src="images/cowboy.png">
                <div class="playerChoices">
                    <button class="rock">
                        Rock
                    </button>
                    <button class="paper">
                        Paper
                    </button>
                    <button class="scissors">
                        Scissors
                    </button>
                </div>
            </div>

            <div class="ai">
                <img src="images/bulletHole.png">
                <img src="images/cowboy2.png">
                <div class="aiChoices">
                    <button class="rock">
                        
                    </button>
                    <button class="paper">
                        
                    </button>
                    <button class="scissors">
                        
                    </button>
                </div>
            </div>
        </div>

        <div class="gameText"> DRAW! </div>
    </div>

    <button class="readyButton"> Ready! </button>

    <div class="ground">
        <div class="tumbleweed">
            <img src = "images/tumbleweed.png">
        </div>
    </div>

    <div class="roundText"></div>

    <div class="healthBars">
        <div class="playerHealth">

        </div>

        <div class="aiHealth">

        </div>
    </div>
     
    <script src="script.js"></script>
</body>
</html>
